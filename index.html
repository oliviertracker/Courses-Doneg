<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Courses - Leclerc Flers</title>
    <style>
        :root { --primary: #1e272e; --accent: #05c46b; --bg: #f1f2f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 160px; }
        header { background: var(--primary); color: white; text-align: center; padding: 15px; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        .cat-block { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cat-title { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }

        /* Cases pour ajouter des ingrédients par catégorie */
        .add-zone { display: flex; gap: 5px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .add-zone input { border: 1px solid #ccc; padding: 8px; border-radius: 8px; flex: 1; font-size: 14px; }
        .btn-ok { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f2f6; gap: 10px; }
        .chk { width: 30px; height: 30px; accent-color: var(--accent); cursor: pointer; }
        .info { flex: 1; }
        .label { font-weight: bold; display: block; font-size: 1rem; }
        .meta { font-size: 0.75rem; color: #7f8c8d; }

        .controls { display: flex; align-items: center; gap: 8px; background: #eee; padding: 5px; border-radius: 20px; }
        .btn-c { background: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .qty { font-weight: bold; min-width: 20px; text-align: center; }
        .price { font-weight: 900; min-width: 75px; text-align: right; color: var(--primary); }

        /* Style quand coché et envoyé au panier */
        .in-panier { background: #e8f5e9; border-left: 5px solid var(--accent); padding-left: 10px; opacity: 0.8; }
        .in-panier .label { text-decoration: line-through; color: #2e7d32; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: white; text-align: center; padding: 15px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 2000; }
        .total-val { font-size: 2.8rem; font-weight: 900; }
    </style>
</head>
<body>

<header>LECLERC FLERS : MA LISTE</header>

<div class="container">
    <div id="main-content"></div>
    <h2 style="color:#7f8c8d; margin: 30px 10px 10px;">🛒 MON PANIER</h2>
    <div id="panier-content"></div>
</div>

<div class="footer">
    <div style="font-size: 0.8rem; font-weight: bold;">TOTAL À PAYER EN CAISSE</div>
    <div class="total-val"><span id="grand-total">0.00</span> €</div>
</div>

<script>
    const CATEGORIES = ["PRODUITS FRAIS", "ÉPICERIE SALÉE", "ÉPICERIE SUCRÉE", "BOISSONS", "FRUITS & LÉGUMES", "ANIMAUX", "HYGIÈNE"];

    let items = [
        { cat: 'PRODUITS FRAIS', name: 'Yaourts chèvre vanille', p: 2.05, q: 1, done: false, obj: '15 packs' },
        { cat: 'PRODUITS FRAIS', name: 'Blancs de dinde/poulet', p: 1.89, q: 1, done: false, obj: '15 lots' },
        { cat: 'PRODUITS FRAIS', name: 'Œufs (12)', p: 2.88, q: 1, done: false, obj: '2 boîtes' },
        { cat: 'ÉPICERIE SUCRÉE', name: 'Galettes St-Michel', p: 1.59, q: 1, done: false, obj: '15 lots' },
        { cat: 'ÉPICERIE SALÉE', name: 'Maquereaux moutarde', p: 1.97, q: 1, done: false, obj: '5 lots' },
        { cat: 'BOISSONS', name: 'Lait soja vanille', p: 1.45, q: 1, done: false, obj: '8 litres' },
        { cat: 'ÉPICERIE SALÉE', name: 'Sardines à la tomate', p: 1.15, q: 1, done: false, obj: '10 boîtes' },
        { cat: 'BOISSONS', name: 'Eau Cristaline', p: 1.20, q: 1, done: false, obj: '8 packs' },
        { cat: 'ANIMAUX', name: 'Croquettes Fido', p: 21.81, q: 1, done: false, obj: '1 sac' },
        { cat: 'ANIMAUX', name: 'Pâtée pour chat', p: 0.23, q: 1, done: false, obj: '12 boîtes' },
        { cat: 'HYGIÈNE', name: 'Gel douche Mixa', p: 5.70, q: 1, done: false, obj: '1 flacon' }
    ];

    // Charger les données sauvegardées
    if(localStorage.getItem('leclerc_budget_v8')) {
        items = JSON.parse(localStorage.getItem('leclerc_budget_v8'));
    }

    function render() {
        const main = document.getElementById('main-content');
        const panier = document.getElementById('panier-content');
        let total = 0;

        main.innerHTML = '';
        panier.innerHTML = '';

        CATEGORIES.forEach(c => {
            const block = document.createElement('div');
            block.className = 'cat-block';
            block.innerHTML = `
                <div class="cat-title">${c}</div>
                <div class="add-zone">
                    <input type="text" id="n-${c}" placeholder="Ingrédient...">
                    <input type="number" id="p-${c}" placeholder="Prix" step="0.01" style="width:70px">
                    <button class="btn-ok" onclick="addItem('${c}')">OK</button>
                </div>
                <div id="list-${c}"></div>
            `;
            main.appendChild(block);
        });

        items.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `row ${item.done ? 'in-panier' : ''}`;
            row.innerHTML = `
                <input type="checkbox" class="chk" ${item.done ? 'checked' : ''} onchange="toggle(${index})">
                <div class="info">
                    <span class="label">${item.name}</span>
                    <span class="meta">${item.p.toFixed(2)}€/u ${item.obj ? ' • ' + item.obj : ''}</span>
                </div>
                ${!item.done ? `
                <div class="controls">
                    <button class="btn-c" onclick="updateQty(${index},-1)">-</button>
                    <span class="qty">${item.q}</span>
                    <button class="btn-c" onclick="updateQty(${index},1)">+</button>
                </div>` : `<div>x${item.q}</div>`}
                <div class="price">${(item.p * item.q).toFixed(2)} €</div>
            `;

            if(item.done) {
                panier.appendChild(row);
                total += (item.p * item.q);
            } else {
                const targetList = document.getElementById(`list-${item.cat}`);
                if(targetList) targetList.appendChild(row);
            }
        });

        document.getElementById('grand-total').innerText = total.toFixed(2);
        localStorage.setItem('leclerc_budget_v8', JSON.stringify(items));
    }

    window.addItem = (c) => {
        const nInput = document.getElementById(`n-${c}`);
        const pInput = document.getElementById(`p-${c}`);
        const name = nInput.value.trim();
        const price = parseFloat(pInput.value);
        if(name && !isNaN(price)) {
            items.push({ cat: c, name: name, p: price, q: 1, done: false, obj: '' });
            nInput.value = ''; pInput.value = '';
            render();
        }
    };

    window.toggle = (i) => { items[i].done = !items[i].done; render(); };
    window.updateQty = (i, d) => { items[i].q = Math.max(1, items[i].q + d); render(); };

    render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leclerc Flers : Ma Liste</title>
    <style>
        :root { --primary: #1e272e; --accent: #05c46b; --bg: #f1f2f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 160px; }
        header { background: var(--primary); color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        .cat-block { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cat-title { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }

        .add-zone { display: flex; gap: 5px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .add-zone input { border: 1px solid #ccc; padding: 10px; border-radius: 8px; flex: 1; font-size: 16px; }
        .btn-ok { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f2f6; gap: 10px; }
        .chk { width: 32px; height: 32px; accent-color: var(--accent); cursor: pointer; }
        .info { flex: 1; }
        .label { font-weight: bold; display: block; font-size: 1.1rem; }
        .meta { font-size: 0.8rem; color: #7f8c8d; }

        .controls { display: flex; align-items: center; gap: 8px; background: #eee; padding: 5px; border-radius: 20px; }
        .btn-c { background: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .qty { font-weight: bold; min-width: 20px; text-align: center; }
        .price { font-weight: 900; min-width: 80px; text-align: right; color: var(--primary); font-size: 1.1rem; }

        .in-panier { background: #e8f5e9; border-left: 5px solid var(--accent); padding-left: 10px; opacity: 0.9; }
        .in-panier .label { text-decoration: line-through; color: #2e7d32; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: white; text-align: center; padding: 15px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 2000; }
        .total-val { font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body>

<header>LECLERC FLERS : MA LISTE</header>

<div class="container">
    <div id="shopping-list"></div>
    <h2 style="color:#7f8c8d; margin: 30px 10px 10px;">🛍️ MON PANIER</h2>
    <div id="cart-list"></div>
</div>

<div class="footer">
    <div style="font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;">TOTAL À PAYER EN CAISSE</div>
    <div class="total-val"><span id="grand-total">0.00</span> €</div>
</div>

<script>
    const CATEGORIES = ["PRODUITS FRAIS", "ÉPICERIE SALÉE", "ÉPICERIE SUCRÉE", "BOISSONS", "FRUITS & LÉGUMES", "ANIMAUX", "HYGIÈNE"];

    let items = [
        { cat: 'PRODUITS FRAIS', name: 'Yaourts chèvre vanille', p: 2.05, q: 1, done: false, obj: '15 packs' },
        { cat: 'PRODUITS FRAIS', name: 'Blancs de dinde / poulet', p: 1.89, q: 1, done: false, obj: '15 lots' },
        { cat: 'PRODUITS FRAIS', name: 'Œufs (12)', p: 2.88, q: 1, done: false, obj: '2 boîtes' },
        { cat: 'ÉPICERIE SALÉE', name: 'Riz Ribasmati', p: 1.93, q: 1, done: false, obj: '2 kg' },
        { cat: 'ÉPICERIE SALÉE', name: 'Maquereaux moutarde', p: 1.97, q: 1, done: false, obj: '5 lots' },
        { cat: 'ÉPICERIE SALÉE', name: 'Sardines à la tomate', p: 1.15, q: 1, done: false, obj: '10 boîtes' },
        { cat: 'ÉPICERIE SUCRÉE', name: 'Galettes St-Michel', p: 1.59, q: 1, done: false, obj: '15 lots' },
        { cat: 'ÉPICERIE SUCRÉE', name: 'Chocolat Poulain', p: 2.37, q: 1, done: false, obj: '4 lots' },
        { cat: 'BOISSONS', name: 'Lait soja vanille', p: 1.45, q: 1, done: false, obj: '8 litres' },
        { cat: 'BOISSONS', name: 'Eau Cristaline', p: 1.20, q: 1, done: false, obj: '8 packs' },
        { cat: 'FRUITS & LÉGUMES', name: 'Bananes', p: 0.99, q: 1, done: false, obj: '4 lots' },
        { cat: 'ANIMAUX', name: 'Croquettes Fido', p: 21.81, q: 1, done: false, obj: '1 sac' },
        { cat: 'ANIMAUX', name: 'Pâtée pour chat', p: 0.23, q: 1, done: false, obj: '12 boîtes' },
        { cat: 'HYGIÈNE', name: 'Gel douche Mixa', p: 5.70, q: 1, done: false, obj: '1 flacon' }
    ];

    if(localStorage.getItem('leclerc_v_stable')) {
        items = JSON.parse(localStorage.getItem('leclerc_v_stable'));
    }

    function render() {
        const listContainer = document.getElementById('shopping-list');
        const cartContainer = document.getElementById('cart-list');
        const totalDisplay = document.getElementById('grand-total');
        let currentTotal = 0;

        listContainer.innerHTML = '';
        cartContainer.innerHTML = '';

        CATEGORIES.forEach(c => {
            const block = document.createElement('div');
            block.className = 'cat-block';
            block.innerHTML = `
                <div class="cat-title">${c}</div>
                <div class="add-zone">
                    <input type="text" id="n-${c}" placeholder="Ajouter...">
                    <input type="number" id="p-${c}" placeholder="Prix" step="0.01" style="width:75px">
                    <button class="btn-ok" onclick="addItem('${c}')">OK</button>
                </div>
                <div id="items-${c}"></div>
            `;
            listContainer.appendChild(block);
        });

        items.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `row ${item.done ? 'in-panier' : ''}`;
            row.innerHTML = `
                <input type="checkbox" class="chk" ${item.done ? 'checked' : ''} onchange="toggleItem(${index})">
                <div class="info">
                    <span class="label">${item.name}</span>
                    <span class="meta">${item.p.toFixed(2)}€/u • ${item.obj || ''}</span>
                </div>
                <div class="controls">
                    <button class="btn-c" onclick="updateQty(${index},-1)">-</button>
                    <span class="qty">${item.q}</span>
                    <button class="btn-c" onclick="updateQty(${index},1)">+</button>
                </div>
                <div class="price">${(item.p * item.q).toFixed(2)} €</div>
            `;

            if(item.done) {
                cartContainer.appendChild(row);
                currentTotal += (item.p * item.q);
            } else {
                const target = document.getElementById(`items-${item.cat}`);
                if(target) target.appendChild(row);
            }
        });

        totalDisplay.innerText = currentTotal.toFixed(2);
        localStorage.setItem('leclerc_v_stable', JSON.stringify(items));
    }

    window.addItem = (category) => {
        const nameInput = document.getElementById(`n-${category}`);
        const priceInput = document.getElementById(`p-${category}`);
        const name = nameInput.value.trim();
        const price = parseFloat(priceInput.value);
        if(name && !isNaN(price)) {
            items.push({ cat: category, name: name, p: price, q: 1, done: false });
            render();
        }
    };

    window.toggleItem = (index) => {
        items[index].done = !items[index].done;
        render();
    };

    window.updateQty = (index, delta) => {
        items[index].q = Math.max(1, items[index].q + delta);
        render();
    };

    render();
</script>
</body>
</html>

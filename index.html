<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Courses Leclerc Flers - FINAL</title>
    <style>
        :root { --primary: #1e272e; --accent: #05c46b; --bg: #f1f2f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 160px; }
        header { background: var(--primary); color: white; text-align: center; padding: 15px; font-weight: bold; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        .cat-block { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cat-title { font-weight: bold; text-transform: uppercase; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }

        .add-zone { display: flex; gap: 5px; margin-bottom: 15px; }
        .add-zone input { border: 1px solid #ccc; padding: 10px; border-radius: 8px; flex: 1; font-size: 16px; }
        .btn-ok { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f2f6; gap: 10px; }
        .chk { width: 28px; height: 28px; accent-color: var(--accent); }
        .info { flex: 1; }
        .label { font-weight: bold; display: block; font-size: 1rem; }
        .meta { font-size: 0.75rem; color: #7f8c8d; }

        .controls { display: flex; align-items: center; gap: 8px; background: #eee; padding: 5px; border-radius: 20px; }
        .btn-c { background: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .qty { font-weight: bold; min-width: 20px; text-align: center; }
        .price { font-weight: 900; min-width: 75px; text-align: right; color: var(--primary); }

        .in-panier { background: #f9f9f9; opacity: 0.6; border-left: 4px solid var(--accent); padding-left: 8px; }
        .in-panier .label { text-decoration: line-through; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--accent); color: white; text-align: center; padding: 15px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 1000; }
        .total-val { font-size: 2.8rem; font-weight: 900; }
    </style>
</head>
<body>

<header>LECLERC FLERS : MON ASSISTANT</header>

<div class="container">
    <div id="main-content"></div>
    <h2 style="color:#7f8c8d; margin: 30px 10px 10px;">🛒 MON PANIER</h2>
    <div id="panier-content"></div>
</div>

<div class="footer">
    <div style="font-size: 0.8rem; font-weight: bold;">TOTAL À PAYER</div>
    <div class="total-val"><span id="grand-total">0.00</span> €</div>
</div>

<script>
    const CATS = ["FRAIS", "ÉPICERIE SALÉE", "ÉPICERIE SUCRÉE", "BOISSONS", "FRUITS", "ANIMAUX", "HYGIÈNE"];

    let items = [
        { cat: 'FRAIS', name: 'Yaourts chèvre vanille', p: 2.05, q: 1, done: false, obj: '15 packs' },
        { cat: 'FRAIS', name: 'Blancs de dinde/poulet', p: 1.89, q: 1, done: false, obj: '15 lots' },
        { cat: 'FRAIS', name: 'Œufs (12)', p: 2.88, q: 1, done: false, obj: '2 boîtes' },
        { cat: 'ÉPICERIE SUCRÉE', name: 'Galettes St-Michel', p: 1.59, q: 1, done: false, obj: '15 lots' },
        { cat: 'ÉPICERIE SALÉE', name: 'Maquereaux moutarde', p: 1.97, q: 1, done: false, obj: '5 lots' },
        { cat: 'BOISSONS', name: 'Lait soja vanille', p: 1.45, q: 1, done: false, obj: '8 litres' },
        { cat: 'ÉPICERIE SALÉE', name: 'Sardines à la tomate', p: 1.15, q: 1, done: false, obj: '10 boîtes' },
        { cat: 'BOISSONS', name: 'Eau Cristaline', p: 1.20, q: 1, done: false, obj: '8 packs' },
        { cat: 'ANIMAUX', name: 'Croquettes Fido', p: 21.81, q: 1, done: false, obj: '1 sac' },
        { cat: 'ANIMAUX', name: 'Pâtée pour chat', p: 0.23, q: 1, done: false, obj: '12 boîtes' },
        { cat: 'HYGIÈNE', name: 'Gel douche Mixa', p: 5.70, q: 1, done: false, obj: '1 flacon' }
    ];

    if(localStorage.getItem('leclerc_data')) {
        items = JSON.parse(localStorage.getItem('leclerc_data'));
    }

    function render() {
        const main = document.getElementById('main-content');
        const panier = document.getElementById('panier-content');
        let total = 0;

        main.innerHTML = '';
        panier.innerHTML = '';

        CATS.forEach(c => {
            const block = document.createElement('div');
            block.className = 'cat-block';
            block.innerHTML = `
                <div class="cat-title">${c}</div>
                <div class="add-zone">
                    <input type="text" id="n-${c}" placeholder="Nom...">
                    <input type="number" id="p-${c}" placeholder="Prix" style="width:60px">
                    <button class="btn-ok" onclick="addItem('${c}')">OK</button>
                </div>
                <div id="list-${c}"></div>
            `;
            main.appendChild(block);
        });

        items.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `row ${item.done ? 'in-panier' : ''}`;
            row.innerHTML = `
                <input type="checkbox" class="chk" ${item.done ? 'checked' : ''} onclick="toggle(${index})">
                <div class="info">
                    <span class="label">${item.name}</span>
                    <span class="meta">${item.p.toFixed(2)}€/u • ${item.obj || ''}</span>
                </div>
                ${!item.done ? `
                <div class="controls">
                    <button class="btn-c" onclick="qty(${index},-1)">-</button>
                    <span class="qty">${item.q}</span>
                    <button class="btn-c" onclick="qty(${index},1)">+</button>
                </div>` : `<div style="margin-right:10px">x${item.q}</div>`}
                <div class="price">${(item.p * item.q).toFixed(2)} €</div>
            `;

            if(item.done) {
                panier.appendChild(row);
                total += (item.p * item.q);
            } else {
                document.getElementById(`list-${item.cat}`).appendChild(row);
            }
        });

        document.getElementById('grand-total').innerText = total.toFixed(2);
        localStorage.setItem('leclerc_data', JSON.stringify(items));
    }

    window.addItem = (c) => {
        const n = document.getElementById(`n-${c}`).value;
        const p = parseFloat(document.getElementById(`p-${c}`).value);
        if(n && !isNaN(p)) {
            items.push({ cat: c, name: n, p: p, q: 1, done: false });
            render();
        }
    };

    window.toggle = (i) => { items[i].done = !items[i].done; render(); };
    window.qty = (i, d) => { items[i].q = Math.max(1, items[i].q + d); render(); };

    render();
</script>
</body>
</html>
